name: Build and test climlab

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '35 4 * * TUE' # Tuesday at 04:35 UTC”

jobs:
  build-and-test:
    name: ${{ matrix.os }} py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}-latest
    defaults:
      run:
        shell: ${{ matrix.shell }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
        os: [Ubuntu, macOS]
        include:
          - os: Ubuntu
            environment-file: environment.yml
            shell: bash -l {0}
          - os: macOS
            environment-file: environment.yml
            shell: bash -l {0}

    steps:
      - uses: actions/checkout@v7

      - name: Setup Python environment with micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: ${{ matrix.environment-file }}
          create-args: python=${{ matrix.python-version }}

      - name: Build and install climlab
        run: |
          python -m pip install --no-deps --editable .

      - name: Import climlab
        run: |
          python -c "import climlab"
          
      - name: Run tests
        run: |
          pytest -v --pyargs climlab.tests -m "not long_orbital"
        #   when we're ready to use codecov again
        # run: |
        #   pytest -v --pyargs climlab.tests --cov=climlab --cov-config .coveragerc --cov-report term-missing -v
        #   codecov
